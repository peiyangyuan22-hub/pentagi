name: CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ─── Phase 1: Tests ───────────────────────────────────────
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - run: go test ./... -v -count=1 -timeout 120s
      - run: go vet ./...
      - name: Run gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build

  # ─── Phase 2: Build ────────────────────────────────────────
  docker-build:
    name: Docker Build
    needs: [go-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - name: Scan Docker images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pentagi-backend
          format: sarif
          output: trivy-results.sarif

  # ─── Phase 3: Code Review (on PR only) ────────────────────
  code-review:
    name: AI Code Review
    needs: [docker-build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: AI Code Review
        uses: reviewdog/action-suggester@v1
        with:
          tool_name: "PentAGI Code Review"
          fail_level: warning
      - name: Check commit message format
        uses: gsactions/commit-message-checker@v2
        with:
          pattern: '^(feat|fix|docs|refactor|test|chore)(\(.+\))?: .{1,100}'
          flags: ''
          error: 'Commit message must follow Conventional Commits format'

  # ─── Phase 4: Deploy (push to develop only) ────────────────
  staging-deploy:
    name: Deploy to Staging
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deploy script here
          # make deploy-staging

  # ─── Phase 5: Notify ───────────────────────────────────────
  notify:
    name: Notify Team
    needs: [code-review, staging-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "Pipeline failed. Check GitHub Actions for details."
          # Add Slack/Email notification here
